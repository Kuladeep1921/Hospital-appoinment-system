services:
  # ── Backend (Node/Express API) ──────────────────────────────────────────────
  - type: web
    name: hospital-api
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGO_URI
        sync: false          # You paste the real value in Render dashboard
      - key: JWT_SECRET
        sync: false          # You paste the real value in Render dashboard
      - key: FRONTEND_URL
        sync: false          # Paste your frontend Render URL after first deploy

  # ── Frontend (React + Vite → static site) ───────────────────────────────────
  - type: web
    name: hospital-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false          # Paste your backend Render URL + /api  e.g. https://hospital-api.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html   # Enables React Router client-side routing
